<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Dictionary web app</title>
</head>

<body class="theme1 sans-serif">
  <div class="container">
    <header>
      <img src="assets/images/logo.svg" alt="logo" class="logo">
      <div class="display_options_div">
        <div class="typo_options_div">
          <div class="options_div">
            <p class="options_paragraph">Serif</p>
            <img src="assets/images/icon-arrow-down.svg" alt="arrow down icon" class="arrow_img">
          </div>
          <div class="typo_div">
            <ul class="typo_list">
              <li class="typo_option">
                <p data-font="sans-serif" class="typo_option_name sans-serif">
                  Sans-serif
                </p>
              </li>
              <li class="typo_option">
                <p data-font="serif" class="typo_option_name serif ">
                  Serif
                </p>
              </li>
              <li class="typo_option">
                <p data-font="mono" class="typo_option_name mono">
                  Mono
                </p>
              </li>
            </ul>
          </div>
        </div>
        <div class="theme_slider_div">
          <input type="range" value="1" min="1" max="2" step="1" id="slider">
          <img src="assets/images/icon-moon.svg" alt="moon icon" class="theme_icon">
        </div>
      </div>
    </header>
    <main>
      <form action="" method="get" class="search_from">
        <div class="input_div">
          <input type="text" name="form_input" id="form_input">
          <img src="assets/images/icon-search.svg" alt="search icon">
        </div>
      </form>

      <section class="word_information_section"></section>

      <section class="meanings_container"></section>
    </main>
    <footer>
    </footer>
  </div>
  <script src="script.js" defer></script>
</body>

</html>
